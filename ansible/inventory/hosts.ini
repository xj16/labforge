# labforge static inventory
#
# IPs mirror lab.yml and the Vagrantfile machine catalogue. When Vagrant's
# built-in ansible provisioner runs it generates its OWN inventory with the
# correct SSH ports/keys; this file exists so you can also run Ansible by hand
# against an already-running lab, e.g.:
#
#   ansible-playbook -i ansible/inventory/hosts.ini ansible/site.yml
#
# (Point ansible_ssh_private_key_file at the per-box key under
#  .vagrant/machines/<name>/virtualbox/private_key, or use vagrant ssh-config.)

[attackers]
attacker ansible_host=10.20.0.10

[siem]
siem ansible_host=10.20.0.20

[targets_web]
juice ansible_host=10.20.0.31 juiceshop=true
dvwa  ansible_host=10.20.0.32 dvwa=true

[targets_windows]
victim ansible_host=10.20.0.40 ansible_connection=winrm

[fleet]
deb    ansible_host=10.20.0.51
ubuntu ansible_host=10.20.0.52
fedora ansible_host=10.20.0.53
arch   ansible_host=10.20.0.54

# ---------------------------------------------------------------------------
# Composite groups
# ---------------------------------------------------------------------------

# Everything that should ship its logs to the SIEM (i.e. every Linux box that
# is not the SIEM itself).
[log_clients:children]
attackers
targets_web
fleet

# All Linux hosts — used for the 'common' baseline role.
[linux:children]
attackers
siem
targets_web
fleet

[all:vars]
ansible_user=vagrant
ansible_python_interpreter=/usr/bin/python3
# The lab is host-only and throwaway; skip host-key prompts for automation.
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
