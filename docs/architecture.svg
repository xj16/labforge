<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" width="920" height="500" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="labforge network topology and attack path">
  <title>labforge — isolated host-only lab: attack path and log flow</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1b28"/>
      <stop offset="1" stop-color="#0a141e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ff8a3d"/>
    </marker>
    <marker id="arrowlog" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4fc3d7"/>
    </marker>
    <marker id="block" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <circle cx="5" cy="5" r="4" fill="none" stroke="#ff4d6d" stroke-width="1.6"/>
      <path d="M2.5 2.5 L7.5 7.5" stroke="#ff4d6d" stroke-width="1.6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="500" fill="url(#bg)"/>

  <!-- host-only segment band -->
  <rect x="28" y="70" width="700" height="380" rx="14" fill="#0f2438" stroke="#1f7a8c" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="44" y="96" fill="#4fc3d7" font-size="13" font-weight="700" letter-spacing=".5">HOST-ONLY SEGMENT · 10.20.0.0/24 · no NAT</text>

  <!-- title -->
  <text x="28" y="42" fill="#ffffff" font-size="22" font-weight="800">labforge <tspan fill="#4fc3d7">— isolated pentest range</tspan></text>
  <text x="28" y="60" fill="#8fb3c9" font-size="12.5">one host-only VirtualBox network · red-team tooling + blue-team SIEM · air-gapped by construction</text>

  <!-- ATTACKER -->
  <g>
    <rect x="60" y="150" width="150" height="86" rx="10" fill="#161f2b" stroke="#ff8a3d" stroke-width="1.6"/>
    <text x="135" y="178" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">attacker</text>
    <text x="135" y="197" text-anchor="middle" fill="#ff8a3d" font-size="11.5">Kali · 10.20.0.10</text>
    <text x="135" y="214" text-anchor="middle" fill="#8fb3c9" font-size="10.5">msf · nmap · sqlmap</text>
    <text x="135" y="227" text-anchor="middle" fill="#8fb3c9" font-size="10.5">hydra · nikto · burp</text>
  </g>

  <!-- TARGETS column -->
  <g>
    <rect x="330" y="108" width="150" height="62" rx="10" fill="#161f2b" stroke="#2b4a63" stroke-width="1.4"/>
    <text x="405" y="132" text-anchor="middle" fill="#ffffff" font-size="13.5" font-weight="700">juice</text>
    <text x="405" y="150" text-anchor="middle" fill="#8fb3c9" font-size="11">Juice Shop · .31:3000</text>

    <rect x="330" y="184" width="150" height="62" rx="10" fill="#161f2b" stroke="#2b4a63" stroke-width="1.4"/>
    <text x="405" y="208" text-anchor="middle" fill="#ffffff" font-size="13.5" font-weight="700">dvwa</text>
    <text x="405" y="226" text-anchor="middle" fill="#8fb3c9" font-size="11">DVWA (LAMP) · .32:80</text>

    <rect x="330" y="260" width="150" height="62" rx="10" fill="#161f2b" stroke="#2b4a63" stroke-width="1.4"/>
    <text x="405" y="284" text-anchor="middle" fill="#ffffff" font-size="13.5" font-weight="700">victim</text>
    <text x="405" y="302" text-anchor="middle" fill="#8fb3c9" font-size="11">Windows · .40 · SMB/RDP</text>

    <rect x="330" y="336" width="150" height="58" rx="10" fill="#12202e" stroke="#25405a" stroke-width="1.2" stroke-dasharray="4 4"/>
    <text x="405" y="360" text-anchor="middle" fill="#c9d8e6" font-size="12.5" font-weight="600">fleet ×4</text>
    <text x="405" y="377" text-anchor="middle" fill="#8fb3c9" font-size="10.5">deb·ubuntu·fedora·arch .51–54</text>
  </g>

  <!-- SIEM -->
  <g>
    <rect x="560" y="184" width="150" height="86" rx="10" fill="#12232f" stroke="#4fc3d7" stroke-width="1.8"/>
    <text x="635" y="212" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">siem</text>
    <text x="635" y="231" text-anchor="middle" fill="#4fc3d7" font-size="11.5">SIEM · 10.20.0.20</text>
    <text x="635" y="248" text-anchor="middle" fill="#8fb3c9" font-size="10.5">rsyslog collector 5514</text>
    <text x="635" y="261" text-anchor="middle" fill="#8fb3c9" font-size="10.5">detection viewer :8000</text>
  </g>

  <!-- attack path: attacker -> dvwa (payload) -->
  <path d="M212 205 C 270 210, 285 213, 328 214" fill="none" stroke="#ff8a3d" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="250" y="200" fill="#ff8a3d" font-size="10.5" font-weight="600">① exploit / scan</text>

  <!-- attacker -> juice & victim (thinner) -->
  <path d="M212 180 C 270 150, 290 140, 328 138" fill="none" stroke="#ff8a3d" stroke-width="1.4" opacity=".6" marker-end="url(#arrow)"/>
  <path d="M212 220 C 270 260, 290 285, 328 290" fill="none" stroke="#ff8a3d" stroke-width="1.4" opacity=".6" marker-end="url(#arrow)"/>

  <!-- log flow: targets -> siem -->
  <path d="M482 138 C 530 150, 545 190, 558 205" fill="none" stroke="#4fc3d7" stroke-width="1.6" opacity=".8" marker-end="url(#arrowlog)"/>
  <path d="M482 214 C 520 216, 535 220, 558 222" fill="none" stroke="#4fc3d7" stroke-width="2.4" marker-end="url(#arrowlog)"/>
  <path d="M482 290 C 525 275, 540 250, 558 240" fill="none" stroke="#4fc3d7" stroke-width="1.6" opacity=".8" marker-end="url(#arrowlog)"/>
  <text x="500" y="196" fill="#4fc3d7" font-size="10.5" font-weight="600">② syslog</text>

  <!-- fleet -> siem log -->
  <path d="M482 360 C 540 340, 552 290, 560 258" fill="none" stroke="#4fc3d7" stroke-width="1.1" opacity=".5" marker-end="url(#arrowlog)"/>

  <!-- detection callout from siem -->
  <path d="M710 226 C 745 226, 752 226, 770 226" fill="none" stroke="#4fc3d7" stroke-width="1.6" marker-end="url(#arrowlog)"/>
  <g>
    <rect x="770" y="150" width="128" height="152" rx="10" fill="#12212f" stroke="#244055" stroke-width="1.3"/>
    <text x="782" y="172" fill="#8fb3c9" font-size="10" font-weight="700" letter-spacing=".5">③ DETECTIONS</text>
    <rect x="782" y="180" width="104" height="26" rx="5" fill="#2a0d14" stroke="#ff4d6d"/>
    <text x="790" y="197" fill="#ffd7de" font-size="10">brute force ·4625</text>
    <rect x="782" y="212" width="104" height="26" rx="5" fill="#291504" stroke="#ff8a3d"/>
    <text x="790" y="229" fill="#ffe0c7" font-size="10">sqlmap scan</text>
    <rect x="782" y="244" width="104" height="26" rx="5" fill="#2a2405" stroke="#ffcf5c"/>
    <text x="790" y="261" fill="#fff1c9" font-size="10">nmap sweep</text>
    <rect x="782" y="276" width="104" height="18" rx="5" fill="#12303a" stroke="#4fc3d7"/>
    <text x="790" y="289" fill="#cdeff5" font-size="9.5">nikto · logon-after-brute</text>
  </g>

  <!-- egress guard wall -->
  <line x1="728" y1="80" x2="728" y2="440" stroke="#ff4d6d" stroke-width="3" stroke-dasharray="2 6"/>
  <g transform="translate(728,455)">
    <text x="0" y="0" text-anchor="middle" fill="#ff4d6d" font-size="11" font-weight="700">egress guard</text>
    <text x="0" y="15" text-anchor="middle" fill="#8fb3c9" font-size="9.5">nftables / Win-FW · DROP off-subnet</text>
  </g>

  <!-- blocked internet -->
  <path d="M712 120 C 780 120, 810 120, 852 120" fill="none" stroke="#ff4d6d" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#block)"/>
  <text x="800" y="108" text-anchor="middle" fill="#ff4d6d" font-size="11" font-weight="700">✕ internet</text>
  <text x="800" y="134" text-anchor="middle" fill="#8fb3c9" font-size="9.5">no route · verified</text>

  <!-- legend -->
  <g transform="translate(44,468)">
    <line x1="0" y1="-4" x2="26" y2="-4" stroke="#ff8a3d" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="32" y="0" fill="#8fb3c9" font-size="11">attack traffic</text>
    <line x1="150" y1="-4" x2="176" y2="-4" stroke="#4fc3d7" stroke-width="2.4" marker-end="url(#arrowlog)"/>
    <text x="182" y="0" fill="#8fb3c9" font-size="11">log / syslog flow</text>
    <line x1="320" y1="-4" x2="346" y2="-4" stroke="#ff4d6d" stroke-width="2.4" stroke-dasharray="2 5"/>
    <text x="352" y="0" fill="#8fb3c9" font-size="11">blocked egress</text>
  </g>
</svg>
