name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Read-only token is plenty for lint.
permissions:
  contents: read

jobs:
  lint:
    name: Lint IaC (yamllint + ansible-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters and Ansible collections
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.16" ansible-lint yamllint
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: yamllint
        run: yamllint .

      - name: ansible-lint
        run: ansible-lint

  syntax:
    name: Ansible syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible + collections
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.16"
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Playbook syntax check
        working-directory: ansible
        run: ansible-playbook --syntax-check site.yml

  shellcheck:
    name: ShellCheck helper scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          # bootstrap.sh is POSIX-ish; scripts target bash.
          additional_files: "scripts/bootstrap.sh"

  powershell:
    name: PSScriptAnalyzer (Windows victim scripts)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $issues = Invoke-ScriptAnalyzer -Path ./windows -Recurse -Severity Error
          $issues | Format-Table -AutoSize
          if ($issues.Count -gt 0) {
            Write-Error "PSScriptAnalyzer found $($issues.Count) error-level issue(s)."
            exit 1
          }
