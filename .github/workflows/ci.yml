name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Read-only token is plenty for lint.
permissions:
  contents: read

jobs:
  lint:
    name: Lint IaC (yamllint + ansible-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters and Ansible collections
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.16" ansible-lint yamllint
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: yamllint
        run: yamllint .

      - name: ansible-lint
        run: ansible-lint

  syntax:
    name: Ansible syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible + collections
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.16"
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Playbook syntax check
        working-directory: ansible
        run: ansible-playbook --syntax-check site.yml

  siem-tests:
    name: SIEM viewer + detection engine (pytest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: siem
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test tooling
        run: python -m pip install --upgrade pip pytest coverage

      - name: Run flagship tests with coverage
        run: |
          python -m coverage run -m pytest
          python -m coverage report --fail-under=90
          python -m coverage xml -o coverage.xml

      - name: Verify the committed coverage badge is roughly current
        run: python tools/check_coverage_badge.py --tolerance 2

      - name: Verify the static demo data is freshly generated
        working-directory: ${{ github.workspace }}
        run: |
          python demo/build_demo.py
          if ! git diff --quiet -- demo/data.js; then
            echo "::error::demo/data.js is stale. Run: python demo/build_demo.py"
            git --no-pager diff -- demo/data.js | head -40
            exit 1
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: siem-coverage
          path: siem/coverage.xml
          if-no-files-found: ignore

  shellcheck:
    name: ShellCheck helper scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          # bootstrap.sh is POSIX-ish; scripts target bash.
          additional_files: "scripts/bootstrap.sh"

  powershell:
    name: PSScriptAnalyzer (Windows victim scripts)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          # Settings file documents an intentional rule exclusion for the
          # deliberately-weak lab accounts — see windows/PSScriptAnalyzerSettings.psd1.
          $issues = Invoke-ScriptAnalyzer -Path ./windows -Recurse `
            -Settings ./windows/PSScriptAnalyzerSettings.psd1
          $issues | Format-Table -AutoSize
          if ($issues.Count -gt 0) {
            Write-Error "PSScriptAnalyzer found $($issues.Count) error-level issue(s)."
            exit 1
          }
