# labforge Ansible configuration
#
# Scoped to the ansible/ directory so `ansible-playbook site.yml` works when run
# from here, and Vagrant's ansible provisioner picks it up too.
[defaults]
inventory            = inventory/hosts.ini
roles_path           = roles
host_key_checking    = False
retry_files_enabled  = False
stdout_callback      = yaml
bin_ansible_callbacks = True
interpreter_python   = auto_silent
# The lab is throwaway and offline — fail fast rather than hang on a dead box.
timeout              = 30
forks                = 8

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
